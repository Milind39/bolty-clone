<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stream Test Client</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
        line-height: 1.6;
      }
      .container {
        max-width: 800px;
        margin: 0 auto;
      }
      textarea {
        width: 100%;
        height: 100px;
        margin-bottom: 10px;
        padding: 8px;
      }
      button {
        background-color: #4caf50;
        color: white;
        padding: 10px 15px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        margin-right: 10px;
      }
      button:hover {
        background-color: #45a049;
      }
      #output {
        border: 1px solid #ddd;
        padding: 15px;
        min-height: 300px;
        white-space: pre-wrap;
        background-color: #f5f5f5;
        font-family: monospace;
        margin-top: 20px;
      }
      .loading {
        color: blue;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Gemini API Stream Test</h1>

      <h2>Test Template Streaming</h2>
      <textarea
        id="promptInput"
        placeholder="Enter your project description here. Example: I'm building a React application with components for user authentication."
      ></textarea>
      <button id="streamTemplate">Stream Template</button>

      <h2>Test Chat Streaming</h2>
      <textarea
        id="chatInput"
        placeholder="Enter your message here."
      ></textarea>
      <button id="streamChat">Stream Chat</button>

      <h2>Output:</h2>
      <div id="output">Response will appear here...</div>
    </div>

    <script>
      document
        .getElementById("streamTemplate")
        .addEventListener("click", () => {
          const prompt = document.getElementById("promptInput").value.trim();
          if (!prompt) {
            alert("Please enter a prompt!");
            return;
          }

          streamFromEndpoint("/template-stream", { prompt });
        });

      document.getElementById("streamChat").addEventListener("click", () => {
        const message = document.getElementById("chatInput").value.trim();
        if (!message) {
          alert("Please enter a message!");
          return;
        }

        streamFromEndpoint("/chat-stream", {
          messages: [{ role: "user", content: message }],
        });
      });

      function streamFromEndpoint(endpoint, body) {
        const outputDiv = document.getElementById("output");
        outputDiv.innerHTML =
          '<div class="loading">Connecting to stream...</div>';

        fetch(`http://localhost:3000${endpoint}`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(body),
        })
          .then((response) => {
            if (!response.ok) {
              throw new Error(`HTTP error! status: ${response.status}`);
            }

            outputDiv.innerHTML =
              '<div class="loading">Receiving stream...</div>';

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = "";

            function processStream({ done, value }) {
              if (done) {
                // Handle any remaining data in buffer
                processBuffer(buffer);
                outputDiv.innerHTML +=
                  '<div style="color:green">Stream complete</div>';
                return;
              }

              // Decode the chunk and add it to our buffer
              buffer += decoder.decode(value, { stream: true });

              // Process any complete SSE messages in the buffer
              processBuffer(buffer);

              // Continue reading
              return reader.read().then(processStream);
            }

            function processBuffer(buffer) {
              // Split the buffer by double newlines (SSE format)
              const lines = buffer.split("\n\n");

              // Keep the last part which might be incomplete
              buffer = lines.pop() || "";

              // Process each complete SSE message
              lines.forEach((line) => {
                if (line.startsWith("data: ")) {
                  const jsonStr = line.substring(6); // Remove "data: " prefix
                  try {
                    const data = JSON.parse(jsonStr);
                    if (data.error) {
                      outputDiv.innerHTML = `<div style="color:red">Error: ${data.error}</div>`;
                    } else if (data.done) {
                      // Final message
                      outputDiv.innerHTML += `<div style="color:green">Completed: ${data.totalChunks} chunks received</div>`;
                    } else if (data.chunk) {
                      // If this is the first chunk, clear the loading message
                      if (data.chunkIndex === 1) {
                        outputDiv.innerHTML = "";
                      }
                      // Append the chunk text
                      outputDiv.innerHTML += data.chunk;
                    } else if (data.projectType) {
                      // For template-stream initial response
                      outputDiv.innerHTML = `<div style="color:blue">Project type: ${data.projectType}</div>`;
                    }
                  } catch (e) {
                    console.error("Error parsing SSE data:", e);
                  }
                }
              });
            }

            return reader.read().then(processStream);
          })
          .catch((error) => {
            outputDiv.innerHTML = `<div style="color:red">Error: ${error.message}</div>`;
          });
      }
    </script>
  </body>
</html>
